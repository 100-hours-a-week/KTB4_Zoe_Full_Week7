<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 로그인</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/pages/auth.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- Common Component: Header -->
      <header class="site-header">
        <div class="site-header__inner">
          <h1 class="site-header__title">아무 말 대잔치</h1>
        </div>
      </header>

      <main class="main main--auth">
        <!-- Page Component: LoginForm -->
        <section class="section auth-form" aria-labelledby="login-title">
          <h2 class="page-title" id="login-title">로그인</h2>

          <form class="form login-form">
            <div class="form__group">
              <label class="form__label" for="email">이메일</label>
              <input class="form__control" id="email" name="email" type="email" placeholder="이메일을 입력하세요" />
              <p class="form__helper">* helper text</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="password">비밀번호</label>
              <input class="form__control" id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" />
              <p class="form__helper">* helper text</p>
            </div>

            <a class="button button--block" href="./pages/posts.html">로그인</a>
            <a class="form__footer-link" href="./pages/signup.html">회원가입</a>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
