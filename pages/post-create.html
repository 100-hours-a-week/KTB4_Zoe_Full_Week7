<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 게시글 작성</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages/post-editor.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- Common Component: Header -->
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-header__back" href="./posts.html" aria-label="게시글 목록으로 이동">&lt;</a>
          <h1 class="site-header__title">아무 말 대잔치</h1>
          <div class="site-header__profile">
            <span class="avatar">U</span>
          </div>
        </div>
      </header>

      <main class="main main--editor main--post-create">
        <!-- Page Component: PostEditorForm -->
        <form class="editor-form">
          <h2 class="editor-form__title">게시글 작성</h2>

          <div class="editor-form__group">
            <label class="editor-form__label" for="post-title">제목*</label>
            <input class="editor-form__input" id="post-title" name="title" type="text" placeholder="제목을 입력해주세요. (최대 26글자)" />
          </div>

          <div class="editor-form__group">
            <label class="editor-form__label" for="post-content">내용*</label>
            <textarea class="editor-form__textarea" id="post-content" name="content" placeholder="내용을 입력해주세요."></textarea>
          </div>

          <div class="editor-form__group">
            <span class="editor-form__label">이미지</span>
            <!-- Common Component: FileField -->
            <div class="file-field">
              <button class="file-field__button" type="button">파일 선택</button>
              <span class="file-field__name">선택된 파일 없음</span>
            </div>
          </div>

          <a class="button button--block editor-form__submit" href="./posts.html">완료</a>
        </form>
      </main>
    </div>
  </body>
</html>
