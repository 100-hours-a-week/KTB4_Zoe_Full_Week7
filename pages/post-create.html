<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 게시글 작성</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages/post-editor.css" />
    <script type="module" src="../js/pages/createPost.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <div id="header-root"></div>

      <main class="main main--editor main--post-create">
        <!-- Page Component: PostEditorForm -->
        <form id="create-form" class="editor-form">
          <h2 class="editor-form__title">게시글 작성</h2>

          <div class="editor-form__group">
            <label class="editor-form__label" for="post-title">제목*</label>
            <input class="editor-form__input" id="post-title" name="title" type="text" maxlength="26" placeholder="제목을 입력해주세요. (최대 26글자)" />
          </div>

          <div class="editor-form__group">
            <label class="editor-form__label" for="post-content">내용*</label>
            <textarea class="editor-form__textarea" id="post-content" name="content" placeholder="내용을 입력해주세요."></textarea>
            <p id="editor-helper" class="form__helper" >* 제목, 내용을 모두 작성해주세요</p>

          </div>

          <div class="editor-form__group">
            <span class="editor-form__label">이미지</span>
            <!-- Common Component: FileField -->
            <div class="file-field">
              <label class="file-field__button" for="post-image">파일 선택</label>
              <input id="post-image" name="image" type="file" accept="image/*" hidden />
              <span id="file-url" class="file-field__name">파일을 선택해주세요.</span>
            </div>
          </div>

          <button id="confirm-button" class="button button--block editor-form__submit" type="submit" disabled>완료</button>
        </form>
      </main>
    </div>
  </body>
</html>
