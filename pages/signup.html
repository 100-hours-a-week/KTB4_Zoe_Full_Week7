<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 회원가입</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages/auth.css" />
    <script type="module" src="../js/pages/signup.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <div id="header-root"></div>

      <main class="main main--auth main--signup">
        <!-- Page Component: SignupForm -->
        <section class="section auth-form" aria-labelledby="signup-title">
          <h2 class="page-title" id="signup-title">회원가입</h2>

          <form id="signup-form" class="form signup-form">
            <!-- Page Component: ProfileUpload -->
            <div class="profile-upload">
              <p class="profile-upload__label">프로필 사진<span class="required-mark">*</span></p>
              <label id="profile-button" class="profile-upload__control" type="button" aria-label="프로필 사진 추가">
                <img id="profile-preview" class="avatar avatar--large" alt="프로필 미리보기" hidden />
                <span id="profile-placeholder" class="avatar avatar--large">+</span>
                <input
                  id="profile-image"
                  name="profileImage"
                  type="file"
                  accept="image/*"
                  hidden
                />
              </label>
              <p id="profile-helper" class="form__helper profile-upload__helper" >* 프로필 사진을 추가해주세요</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="email">이메일<span class="required-mark">*</span></label>
              <input class="form__control" id="email" name="email" type="email" placeholder="이메일을 입력하세요" />
              <p id="email-helper" class="form__helper" >* 이메일을 입력해주세요.</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="password">비밀번호<span class="required-mark">*</span></label>
              <input class="form__control" id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" />
              <p id="password-helper" class="form__helper" >* 비밀번호를 입력해주세요</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="password-confirm">비밀번호 확인<span class="required-mark">*</span></label>
              <input class="form__control" id="password-confirm" name="password-confirm" type="password" placeholder="비밀번호를 한번 더 입력하세요" />
              <p id="passwordConfirm-helper" class="form__helper" >* 비밀번호를 한번더 입력해주세요</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="nickname">닉네임<span class="required-mark">*</span></label>
              <input class="form__control" id="nickname" name="nickname" type="text" placeholder="닉네임을 입력하세요" />
              <p id="nickname-helper" class="form__helper" >* 닉네임을 입력해주세요</p>
            </div>

            <button id="signup-button" type="submit" class="button button--block" disabled >회원가입</button>
            <a class="form__footer-link" href="../index.html">로그인하러 가기</a>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
