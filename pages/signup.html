<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 회원가입</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages/auth.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- Common Component: Header -->
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-header__back" href="../index.html" aria-label="이전 페이지로 이동">&lt;</a>
          <h1 class="site-header__title">아무 말 대잔치</h1>
        </div>
      </header>

      <main class="main main--auth main--signup">
        <!-- Page Component: SignupForm -->
        <section class="section auth-form" aria-labelledby="signup-title">
          <h2 class="page-title" id="signup-title">회원가입</h2>

          <form class="form signup-form">
            <!-- Page Component: ProfileUpload -->
            <div class="profile-upload">
              <p class="profile-upload__label">프로필 사진<span class="required-mark">*</span></p>
              <button class="profile-upload__control" type="button" aria-label="프로필 사진 추가">
                +
              </button>
              <p class="form__helper profile-upload__helper">* helper text</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="email">이메일<span class="required-mark">*</span></label>
              <input class="form__control" id="email" name="email" type="email" placeholder="이메일을 입력하세요" />
              <p class="form__helper">* helper text</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="password">비밀번호<span class="required-mark">*</span></label>
              <input class="form__control" id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" />
              <p class="form__helper">* helper text</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="password-confirm">비밀번호 확인<span class="required-mark">*</span></label>
              <input class="form__control" id="password-confirm" name="password-confirm" type="password" placeholder="비밀번호를 한번 더 입력하세요" />
              <p class="form__helper">* helper text</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="nickname">닉네임<span class="required-mark">*</span></label>
              <input class="form__control" id="nickname" name="nickname" type="text" placeholder="닉네임을 입력하세요" />
              <p class="form__helper">* helper text</p>
            </div>

            <a class="button button--block" href="../index.html">회원가입</a>
            <a class="form__footer-link" href="../index.html">로그인하러 가기</a>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
