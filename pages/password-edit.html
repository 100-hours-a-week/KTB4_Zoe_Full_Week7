<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 비밀번호수정</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages/auth.css" />
    <script type="module" src="../js/pages/passwordEdit.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <div id="header-root"></div>

      <main class="main main--auth">
        <section class="section auth-form" aria-labelledby="password-edit-title">
          <h2 class="page-title" id="password-edit-title">비밀번호수정</h2>
          <form id="password-edit-form" class="form">
            <div class="form__group">
              <label class="form__label" for="password">비밀번호</label>
              <input class="form__control" id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" />
              <p id="password-helper" class="form__helper" hidden></p>
            </div>

            <div class="form__group">
              <label class="form__label" for="password-confirm">비밀번호 확인</label>
              <input class="form__control" id="password-confirm" name="password-confirm" type="password" placeholder="비밀번호를 한번 더 입력하세요" />
              <p id="password-confirm-helper" class="form__helper" hidden></p>
            </div>

            <button id="password-edit-button" class="button button--block" type="submit" disabled>수정하기</button>
            <p id="password-toast" class="toast profile-edit__complete" role="status" aria-live="polite" hidden>수정 완료</p>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
