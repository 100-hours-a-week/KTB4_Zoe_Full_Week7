<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 비밀번호수정</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages/auth.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-header__back" href="./posts.html" aria-label="게시글 목록으로 이동">&lt;</a>
          <h1 class="site-header__title">아무 말 대잔치</h1>
          <div class="site-header__profile"><span class="avatar">U</span></div>
        </div>
      </header>

      <main class="main main--auth">
        <section class="section auth-form" aria-labelledby="password-edit-title">
          <h2 class="page-title" id="password-edit-title">비밀번호수정</h2>
          <form class="form">
            <div class="form__group">
              <label class="form__label" for="password">비밀번호</label>
              <input class="form__control" id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" />
              <p class="form__helper">* helper text</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="password-confirm">비밀번호 확인</label>
              <input class="form__control" id="password-confirm" name="password-confirm" type="password" placeholder="비밀번호를 한번 더 입력하세요" />
              <p class="form__helper">* helper text</p>
            </div>

            <a class="button button--block" href="./posts.html">수정하기</a>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
