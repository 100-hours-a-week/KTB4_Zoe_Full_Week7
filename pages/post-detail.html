<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 게시글 상세</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages/post-detail.css" />
    <script src="../js/pages/PostDetail.js" type="module"></script>
  </head>
  <body>
    <div class="app-shell">
      <div id="header-root"></div>

      <main class="main main--post-detail">
        <!-- Page Component: PostContent -->
        <article class="post-detail">
          <header class="post-detail__header">
            <h2 id="title" class="post-detail__title"></h2>
            <div class="post-detail__meta-row">
              <div class="author">
                <img id="author-profile" class="avatar"></img>
                <div class="author__meta">
                  <strong id="author-name" class="author__name"></strong>
                </div>
              </div>
              <time id="created-at" class="author__date"></time>
              <div id="post-actions" class="post-detail__actions" hidden>
                <a id="post-edit-link" class="text-button" href="./post-edit.html">수정</a>
                <button id="post-delete-button" class="text-button" type="button">삭제</button>
              </div>
            </div>
          </header>

          <img id="image" class="post-detail__image" role="img" aria-label="게시글 이미지 자리"></img>

          <p id="content" class="post-detail__body"></p>

          <!-- Page Component: PostStats -->
          <div class="post-detail__counters" aria-label="게시글 통계">
            <button id="like-button" class="counter like-button" type="button" data-liked="false">
              <span id="like-count"></span>
              <span class="counter__label">좋아요수</span>
            </button>
            <div class="counter">
              <span id="view-count"></span>
              <span class="counter__label">조회수</span>
            </div>
            <div class="counter">
              <span id="comment-count"></span>
              <span class="counter__label">댓글</span>
            </div>
          </div>
        </article>

        <!-- Page Component: CommentForm -->
        <section class="comment-form" aria-label="댓글 작성">
          <textarea id="comment-content" class="comment-form__textarea" placeholder="댓글을 남겨주세요!"></textarea>
          <div class="comment-form__footer">
            <button id="comment-button" class="button button--pill" type="button" disabled>댓글 등록</button>
          </div>
        </section>

        <!-- Page Component: CommentList -->
        <section id="comment-list" class="comment-list" aria-label="댓글 목록"></section>
      </main>
    </div>
  </body>
</html>
