<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 회원정보수정</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages/auth.css" />
    <script src="../js/pages/editProfile.js" type="module"></script>
  </head>
  <body>
    <div class="app-shell">
      <div id="header-root"></div>

      <main class="main main--auth main--profile-edit">
        <section class="section auth-form" aria-labelledby="profile-edit-title">
          <h2 class="page-title" id="profile-edit-title">회원정보수정</h2>
          <form id="profile-edit-form" class="form">
            <div class="profile-upload">
              <p class="profile-upload__label">프로필 사진*</p>
              <label class="profile-upload__control" for="profile-image" aria-label="프로필 사진 변경">
                <span id="profile-avatar" class="avatar avatar--large">U</span>
                <span class="profile-upload__badge">변경</span>
                <input id="profile-image" name="profileImage" type="file" accept="image/*" hidden />
              </label>
            </div>

            <div class="form__group">
              <p class="form__label" id="email-label">이메일</p>
              <p id="profile-email" class="profile-edit__email" aria-labelledby="email-label"></p>
            </div>

            <div class="form__group">
              <label class="form__label" for="nickname">닉네임</label>
              <input class="form__control" id="nickname" name="nickname" type="text" />
              <p id="nickname-helper" class="form__helper" hidden></p>
            </div>

            <a id="profile-update-button" class="button button--block" href="./posts.html">수정하기</a>
            <button id="withdraw-button" class="button button--ghost" type="button">회원 탈퇴</button>
            <p id="profile-toast" class="toast profile-edit__complete" role="status" aria-live="polite" hidden>수정 완료</p>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
