<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 말 대잔치 - 회원정보수정</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages/auth.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-header__back" href="./posts.html" aria-label="게시글 목록으로 이동">&lt;</a>
          <h1 class="site-header__title">아무 말 대잔치</h1>
          <div class="site-header__profile"><span class="avatar">U</span></div>
        </div>
      </header>

      <main class="main main--auth main--profile-edit">
        <section class="section auth-form" aria-labelledby="profile-edit-title">
          <h2 class="page-title" id="profile-edit-title">회원정보수정</h2>
          <form class="form">
            <div class="profile-upload">
              <p class="profile-upload__label">프로필 사진*</p>
              <button class="profile-upload__control" type="button" aria-label="프로필 사진 변경">
                <span class="avatar avatar--large">U</span>
                <span class="profile-upload__badge">변경</span>
              </button>
            </div>

            <div class="form__group">
              <p class="form__label" id="email-label">이메일</p>
              <p class="profile-edit__email" aria-labelledby="email-label">startupcode@gmail.com</p>
            </div>

            <div class="form__group">
              <label class="form__label" for="nickname">닉네임</label>
              <input class="form__control" id="nickname" name="nickname" type="text" value="더미 작성자 1" />
              <p class="form__helper">* helper text</p>
            </div>

            <a class="button button--block" href="./posts.html">수정하기</a>
            <button class="button button--ghost" type="button">회원 탈퇴</button>
            <button class="button button--pill profile-edit__complete" type="button">수정완료</button>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
